name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - '1.23.x'
          - '1.24.x'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify formatting
        run: |
          files=$(find cmd internal -name '*.go' -print)
          test -n "$files"
          diff=$(gofmt -d $files)
          if [ -n "$diff" ]; then
            printf '%s\n' "$diff"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: go build ./...
