name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Build archives
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          outdir="dist/tuna_${GOOS}_${GOARCH}"
          mkdir -p "$outdir"

          go build -trimpath -ldflags='-s -w' -o "$outdir/tuna-entry${ext}" ./cmd/tuna-entry
          go build -trimpath -ldflags='-s -w' -o "$outdir/tuna-exit${ext}" ./cmd/tuna-exit

          cp README.md "$outdir/README.md"
          cp config.entry.example "$outdir/config.entry.example"
          cp config.exit.example "$outdir/config.exit.example"

          archive="tuna_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -r "${archive}.zip" "$(basename "$outdir")")
          else
            tar -C dist -czf "dist/${archive}.tar.gz" "$(basename "$outdir")"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tuna-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
